# docker-compose.yaml — single-node deployment of the dashboard.
#
# Usage:
#   docker compose up -d
#   curl http://127.0.0.1:8080/health
#
# Override env vars (CIA_API_TOKEN, CIA_MODEL_API_KEY, CIA_LOG_LEVEL,
# CIA_MAX_RUN_SECONDS, etc.) by creating a ``.env`` file alongside this
# compose file. ``.env`` is gitignored — never commit live secrets.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: competitive-intel-agents:local
    container_name: competitive-intel
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persists artifacts.sqlite, journal.sqlite and runs.json across
      # container restarts. Owned by uid 1000 inside the container —
      # ``mkdir ./data`` and (if needed) ``chown -R 1000:1000 ./data``
      # before first ``up``.
      - ./data:/data
    env_file:
      - path: .env
        required: false
    environment:
      # JSON log lines so log shippers / aggregators can parse them.
      CIA_LOG_FORMAT: json
      CIA_LOG_LEVEL: ${CIA_LOG_LEVEL:-INFO}
